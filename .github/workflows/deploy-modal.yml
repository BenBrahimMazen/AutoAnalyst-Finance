name: Deploy (Modal)

# Auto-deploys the full stack (FastAPI + Streamlit) to Modal on every push to
# main. Requires repo secrets MODAL_TOKEN_ID and MODAL_TOKEN_SECRET
# (create with: `modal token create --name gh-actions`).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py
